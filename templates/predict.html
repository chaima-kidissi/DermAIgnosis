<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse IA - DermAIgnosis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard"><i class="fas fa-microscope"></i> DermAIgnosis</a>
        <div class="ms-auto">
            <a href="/dashboard" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 shadow" style="width: 550px;">
        <div class="text-center">
            <i class="fas fa-camera fa-3x text-primary"></i>
            <h3 class="mt-2">Analyse dermatologique</h3>
            <p class="text-muted">Téléchargez une image de lésion cutanée (format JPG/PNG)</p>
        </div>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user"></i> Nom du patient</label>
                <input name="name" class="form-control" placeholder="Nom complet" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-calendar-alt"></i> Âge</label>
                <input name="age" type="number" class="form-control" placeholder="Âge en années" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-image"></i> Image de la lésion</label>
                <input name="image" type="file" class="form-control" accept="image/*" required>
                <div class="form-text">Résolution recommandée : 224x224 pixels ou plus</div>
            </div>
            <button class="btn btn-primary w-100 py-2"><i class="fas fa-microchip"></i> Lancer l'analyse IA</button>
        </form>
        <hr class="my-3">
        <div class="text-center small text-muted">
            <i class="fas fa-shield-alt"></i> L'IA est un outil d'aide à la décision médicale.
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
