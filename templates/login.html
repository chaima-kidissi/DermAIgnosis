<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DermAIgnosis - Connexion médecin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #0a1928;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: none;
            width: 420px;
            transition: transform 0.3s;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            background-color: #0077b6;
            border-color: #0077b6;
            border-radius: 2rem;
            padding: 0.6rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #005f8c;
        }

        .form-control {
            border-radius: 2rem;
            padding: 0.7rem 1rem;
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #0077b6;
            background: transparent;
            border: none;
            font-size: 1.2rem;
            z-index: 3;
        }

        .alert {
            border-radius: 2rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeInUp 0.8s ease-out;
        }

        @media (max-width: 500px) {
            .login-card {
                width: 90%;
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-card p-4 shadow">
            <div class="text-center mb-3">
                <i class="fas fa-microscope fa-3x text-primary"></i>
                <h2 class="mt-2 fw-bold">DermAIgnosis</h2>
                <p class="text-muted">Analyse Dermatologique par Intelligence Artificielle</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user"></i> Nom d'utilisateur</label>
                    <input name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-lock"></i> Mot de passe</label>
                    <div class="password-wrapper">
                        <input name="password" type="password" id="passwordField" class="form-control" required>
                        <span class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye-slash" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>
                <button class="btn btn-primary w-100 py-2"><i class="fas fa-sign-in-alt"></i> Connexion</button>
            </form>
            <hr class="my-3">
            <p class="text-center text-muted small">Plateforme sécurisée - Conformité médicale</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Animation particules (identique)
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 120;
            const CONNECTION_DISTANCE = 120;
            const PARTICLE_SPEED = 0.3;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * PARTICLE_SPEED;
                    this.vy = (Math.random() - 0.5) * PARTICLE_SPEED;
                    this.radius = Math.random() * 2 + 1.5;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 119, 182, ${this.opacity})`;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new Particle());
                }
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < CONNECTION_DISTANCE) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const opacity = (1 - distance / CONNECTION_DISTANCE) * 0.25;
                            ctx.strokeStyle = `rgba(0, 119, 182, ${opacity})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                const grad = ctx.createLinearGradient(0, 0, width, height);
                grad.addColorStop(0, '#0a1928');
                grad.addColorStop(1, '#0c2a3b');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);

                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                drawConnections();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            resizeCanvas();
            initParticles();
            animate();
        })();

        // Fonction pour l'icône œil (comportement corrigé)
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('passwordField');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function() {
            const type = passwordField.getAttribute('type');
            if (type === 'password') {
                // Afficher le mot de passe
                passwordField.setAttribute('type', 'text');
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            } else {
                // Masquer le mot de passe
                passwordField.setAttribute('type', 'password');
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            }
        });
    </script>
</body>
</html>
