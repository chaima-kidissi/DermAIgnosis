<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Patients - DermAIgnosis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard"><i class="fas fa-microscope"></i> DermAIgnosis</a>
        <div class="ms-auto">
            <a href="/dashboard" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2><i class="fas fa-address-book text-primary"></i> Liste complète des patients</h2>
    <div class="table-responsive mt-3">
        <table class="table table-hover table-bordered align-middle">
            <thead class="table-dark">
                <tr><th>ID</th><th>Nom</th><th>Âge</th><th>Résultat</th><th>Probabilité</th><th>Image</th><th>Action</th></tr>
            </thead>
            <tbody>
                {% for p in patients %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.age }}</td>
                    <td><span class="badge {% if p.result == 'Malin' %}bg-danger{% else %}bg-success{% endif %}">{{ p.result }}</span></td>
                    <td class="{% if p.probability > 70 %}prob-high{% elif p.probability < 30 %}prob-low{% endif %}">{{ p.probability }}%</td>
                    <td><img src="{{ p.image_path }}" class="table-img" alt="image lésion"></td>
                    <td><a href="/followup/{{ p.id }}" class="btn btn-sm btn-outline-info"><i class="fas fa-chart-line"></i> Suivi</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<footer>
    <div class="container">
        <span>Base de données patients - DermAIgnosis</span>
    </div>
</footer>
</body>
</html>
